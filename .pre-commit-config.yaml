repos:
  - repo: local
    hooks:
      - id: linting
        name: Eslint (local)
        language: system
        # run from frontend so plugins resolve from frontend/node_modules
        entry: bash -lc 'cd frontend && pnpm run -s lint:fix --'
        # pre-commit will append the file list AFTER the `--`
        files: ^frontend/.*\.(js|jsx|ts|tsx|json|css|scss|html|md)$
        exclude: ^frontend/(node_modules|dist|build|.next|out)/

  - repo: local
    hooks:
      - id: prettier
        name: prettier (local)
        language: system
        # run from frontend so plugins resolve from frontend/node_modules
        entry: bash -lc 'cd frontend && pnpm run -s format:write --'
        # pre-commit will append the file list AFTER the `--`
        files: ^frontend/.*\.(js|jsx|ts|tsx|json|css|scss|html|md)$
        exclude: ^frontend/(node_modules|dist|build|.next|out)/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        files: ^backend/.*\.py$
        args: [--fix]
      - id: ruff-format
        files: ^backend/.*\.py$

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        files: ^infra/.*\.tf$

  - repo: local
    hooks:
      - id: terraform-ascii-only
        name: terraform no non-ASCII (AWS rejects em/en dashes)
        language: system
        entry: scripts/check-tf-ascii.sh
        files: ^infra/.*\.tf$

  - repo: local
    hooks:
      - id: semgrep
        name: semgrep (custom rules)
        language: system
        entry: semgrep --config=semgrep/ --error backend/
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright (local)
        language: system
        entry: bash -lc 'cd backend && uv run basedpyright'
        files: ^backend/.*\.py$
        pass_filenames: false
