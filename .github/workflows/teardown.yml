name: Teardown (one-off — destroy old sloopquest stack)

# Throwaway workflow. Destroys the pre-rename `sloopquest` stack whose state is
# stranded at tf-state-sloopquest-us-east-1 (the repo has since been renamed to
# `marlin`, so normal CI can no longer address this state). It checks out the
# pre-rename commit (72ee9bf) so the Terraform config matches the old state.
# Delete this file once the run is green.

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  destroy:
    name: Terraform destroy (sloopquest)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./infra
    steps:
      - name: Checkout pre-rename config
        uses: actions/checkout@v4
        with:
          ref: 72ee9bf199007f100a4c8ef99f21e082005ad334

      - name: Patch config for teardown (drop prevent_destroy, force-empty S3)
        run: |
          find . -name '*.tf' -exec sed -i '/prevent_destroy *= *true/d' {} +
          sed -i 's|resource "aws_s3_bucket" "main" {|resource "aws_s3_bucket" "main" {\n  force_destroy = true|' modules/s3_bucket/main.tf
          echo "--- remaining prevent_destroy (should be none) ---"
          grep -rn "prevent_destroy" . || echo "none"
          echo "--- s3 bucket resource ---"
          sed -n '1,4p' modules/s3_bucket/main.tf

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init (old state)
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=tf-state-sloopquest-us-east-1" \
            -backend-config="key=sloopquest/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Select production workspace
        run: terraform workspace select production

      - name: Terraform destroy
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_project_name: sloopquest
          TF_VAR_environment: production
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_vercel_api_token: ${{ secrets.VERCEL_API_TOKEN }}
          TF_VAR_logtail_api_token: ${{ secrets.LOGTAIL_API_TOKEN }}
        run: terraform destroy -auto-approve -no-color
